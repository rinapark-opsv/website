<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dataspace AI — v2 Hero (AI 리서처)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
:root{
  --bg-page:#F4F4F4; --bg-canvas:#fff; --bg-hover:#F3F3F3;
  --border:#ECECEC; --border-strong:#D9D9D9;
  --text-primary:#0D0D0D; --text-secondary:#5D5D5D; --text-tertiary:#8F8F8F;
  --blue:#4781FF; --blue-light:#E0EAFF; --blue-soft:#F0F5FF; --blue-faint:#F6F8FC; --blue-hover:#2469FF; --blue-deep:#0050FF;
  --green:#40B08E;
  --r-sm:8px; --r-md:13px; --r-lg:21px; --r-pill:9999px;
  --t-fast:150ms ease;
  --font:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  --shadow-lg:0 12px 40px rgba(0,0,0,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg-page);color:var(--text-primary);-webkit-font-smoothing:antialiased;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 24px 80px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}

/* 상단 타이틀 */
.head{text-align:center;margin-bottom:26px;}
.head h1{font-size:30px;font-weight:700;letter-spacing:-0.6px;}
.head p{font-size:14px;color:var(--text-secondary);margin-top:8px;letter-spacing:-0.2px;}

/* 3탭 */
.tabs{display:flex;gap:6px;background:#fff;border:1px solid var(--border);border-radius:var(--r-pill);padding:5px;margin-bottom:22px;box-shadow:var(--shadow-lg);}
.tab{display:flex;align-items:center;gap:8px;height:42px;padding:0 20px;border-radius:var(--r-pill);font-size:14px;font-weight:600;color:var(--text-tertiary);letter-spacing:-0.3px;transition:all var(--t-fast);}
.tab i{font-size:17px;}
.tab:hover{color:var(--text-secondary);background:var(--bg-hover);}
.tab.active{background:var(--blue);color:#fff;}
.tab.active:hover{background:var(--blue);}

/* 앱 프레임 */
.frame{width:1040px;max-width:100%;background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);overflow:hidden;}

/* 컴포저 (사소한 입력) */
.composer{padding:22px 26px 6px;}
.input-bar{display:flex;align-items:center;gap:12px;border:1px solid var(--border-strong);border-radius:var(--r-lg);padding:13px 14px 13px 18px;background:#fff;}
.input-bar .txt{flex:1;font-size:14.5px;color:var(--text-primary);letter-spacing:-0.3px;line-height:1.5;}
.input-bar .txt .cursor{display:inline-block;width:1.5px;height:16px;background:var(--blue);margin-left:1px;vertical-align:-3px;animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0;}}
.send{width:34px;height:34px;border-radius:50%;background:var(--blue-deep);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity var(--t-fast);}
.send:hover{opacity:.85;}
.send i{font-size:16px;}
.easy{display:flex;gap:7px;margin:11px 2px 0;}
.easy .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--text-tertiary);background:var(--blue-faint);border:1px solid var(--border);border-radius:var(--r-pill);padding:4px 10px;}
.easy .chip i{font-size:12px;color:var(--blue);}

/* AI 응답 라인 */
.ai-line{display:flex;align-items:center;gap:9px;padding:16px 28px 4px;}
.ind{position:relative;width:24px;height:24px;flex-shrink:0;}
.ind > *{position:absolute;inset:0;width:100%;height:100%;transition:opacity 520ms linear;}
.ind video{object-fit:contain;border-radius:5px;}
.ind .hex{background:url(dataspace-hex.svg) center/contain no-repeat;opacity:0;transform:scale(.9);}
.ind.done video{opacity:0;}
.ind.done .hex{opacity:1;}
.ai-line .say{font-size:13.5px;color:var(--text-secondary);letter-spacing:-0.3px;}
.ai-line .say b{color:var(--text-primary);font-weight:600;}

/* 스테이지 (설문이 조립되는 캔버스) */
.stage{position:relative;margin:10px 22px 26px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--blue-faint);}
.stage-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;}
.stage-title{font-size:13px;font-weight:700;color:var(--text-primary);letter-spacing:-0.3px;}
.counter{display:flex;gap:7px;}
.cnt{display:inline-flex;align-items:baseline;gap:4px;font-size:11px;font-weight:600;color:var(--text-secondary);background:#fff;border:1px solid var(--border);border-radius:var(--r-pill);padding:4px 11px;letter-spacing:-0.2px;}
.cnt b{font-size:13px;font-weight:700;color:var(--blue-deep);font-variant-numeric:tabular-nums;}
.cnt.branch b{color:#0050FF;} .cnt.pipe b{color:var(--green);}

.survey{position:relative;padding:6px 96px 20px 20px;}  /* 우측 96px = 로직 와이어 거터 */
#wires{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;overflow:visible;}
.wire{fill:none;stroke-linecap:round;}
.wire.branch{stroke:var(--blue);} .wire.pipe{stroke:var(--green);}
.wire-head{opacity:0;transition:opacity 200ms ease;}

/* 섹션 라벨 */
.sd-sec{font-size:12.5px;font-weight:600;color:var(--text-secondary);letter-spacing:-0.3px;margin:16px 0 6px;}

/* 문항 카드 */
.q{position:relative;padding:15px 0 14px;border-top:1px solid var(--border);opacity:0;transform:translateY(7px);transition:opacity .42s ease,transform .42s cubic-bezier(.32,.72,0,1);}
.q.in{opacity:1;transform:none;}
.q:first-of-type{border-top:none;}
.qq{font-size:14.5px;font-weight:600;color:var(--text-primary);line-height:1.5;letter-spacing:-0.3px;}
.qn{font-weight:700;margin-right:7px;}
.qmeta{display:flex;align-items:center;gap:6px;margin:6px 0 9px;flex-wrap:wrap;}
.qtype{display:inline-block;font-size:9.5px;font-weight:600;color:var(--text-tertiary);background:var(--bg-hover);border-radius:4px;padding:2px 7px;letter-spacing:0;}
/* 로직 칩 (분기/파이핑) — 와이어와 함께 등장 */
.lchip{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;border-radius:var(--r-pill);padding:2px 9px;opacity:0;transform:translateX(-4px);transition:opacity .3s ease,transform .3s ease;}
.lchip.show{opacity:1;transform:none;}
.lchip.branch{color:var(--blue-deep);background:var(--blue-soft);}
.lchip.pipe{color:#1d8a73;background:var(--green-bg);}
.lchip i{font-size:11px;}
/* 보기 */
.opts{list-style:none;display:flex;flex-direction:column;gap:1px;}
.opt{display:flex;align-items:center;gap:9px;padding:3px 0;font-size:12.5px;color:var(--text-secondary);line-height:1.4;}
.mark{width:13px;height:13px;flex-shrink:0;border:1.5px solid #C9CDD5;background:#fff;}
.mark.radio{border-radius:50%;} .mark.check{border-radius:4px;}
.opt.piped{color:var(--text-tertiary);font-style:italic;}
/* 척도 */
.scale{display:flex;gap:5px;margin-top:3px;}
.sc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9px;color:var(--text-tertiary);text-align:center;line-height:1.2;}
.sc .dot{width:13px;height:13px;border-radius:50%;border:1.5px solid #C9CDD5;background:#fff;}

/* 종료 노드 */
.endnode{margin-top:14px;display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--text-tertiary);background:#fff;border:1px dashed var(--border-strong);border-radius:var(--r-pill);padding:6px 13px;opacity:0;transition:opacity .4s ease;}
.endnode.in{opacity:1;}
.endnode i{font-size:13px;}

/* 리플레이 / 비활성 탭 안내 */
.replay{display:flex;justify-content:center;padding:0 0 4px;}
.replay button{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--blue-deep);padding:8px 14px;border-radius:var(--r-pill);transition:background var(--t-fast);}
.replay button:hover{background:var(--blue-soft);}
.placeholder{padding:90px 20px;text-align:center;color:var(--text-tertiary);font-size:14px;}
.placeholder i{font-size:30px;display:block;margin-bottom:12px;color:var(--border-strong);}
</style>
</head>
<body>
  <div class="head">
    <h1>한 문장이면, AI 리서치 팀이 결과물을 뿅.</h1>
    <p>당신은 거의 아무것도 하지 않았습니다.</p>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="researcher"><i class="ph ph-clipboard-text"></i>AI 리서처</button>
    <button class="tab" data-tab="analyst"><i class="ph ph-chart-bar"></i>AI 분석가</button>
    <button class="tab" data-tab="consumer"><i class="ph ph-chats-circle"></i>AI 소비자</button>
  </div>

  <div class="frame">
    <!-- 컴포저 (사소한 입력) -->
    <div class="composer">
      <div class="input-bar">
        <span class="txt" id="prompt"></span>
        <button class="send"><i class="ph ph-arrow-up"></i></button>
      </div>
      <div class="easy">
        <span class="chip"><i class="ph ph-textbox"></i>입력: 한 문장</span>
        <span class="chip"><i class="ph ph-timer"></i>소요: 약 10초</span>
        <span class="chip"><i class="ph ph-sliders-horizontal"></i>설정: 없음</span>
      </div>
    </div>

    <!-- AI 응답 라인 -->
    <div class="ai-line">
      <span class="ind" id="ind">
        <video autoplay loop muted playsinline poster="ai-indicator-poster.png">
          <source src="ai-indicator.webm" type="video/webm">
          <source src="ai-indicator.mp4" type="video/mp4">
        </video>
        <span class="hex"></span>
      </span>
      <span class="say" id="say">로직까지 설계해 만들고 있어요…</span>
    </div>

    <!-- 스테이지: 설문 조립 -->
    <div class="stage" id="stage">
      <div class="stage-head">
        <span class="stage-title">K-뷰티 컨셉 검증 설문</span>
        <span class="counter">
          <span class="cnt">문항 <b id="c-q">0</b></span>
          <span class="cnt branch">분기 <b id="c-b">0</b></span>
          <span class="cnt pipe">파이핑 <b id="c-p">0</b></span>
        </span>
      </div>
      <div class="survey" id="survey">
        <svg id="wires"></svg>
        <!-- 문항은 JS로 렌더 -->
      </div>
    </div>

    <div class="replay">
      <button onclick="play()"><i class="ph ph-arrow-clockwise"></i>다시 보기</button>
    </div>
  </div>

<script>
const SURVEY=[
 {n:'Q1',sec:'스크리닝',type:'객관식 단일',q:'최근 6개월 내 스킨케어·메이크업을 구매한 적 있나요?',opts:['예','아니오']},
 {n:'Q2',type:'객관식 단일',q:'K-뷰티를 얼마나 알고 있나요?',opts:['매우 잘 안다','어느 정도 안다','들어봤다','잘 모른다','전혀 모른다']},
 {n:'Q3',type:'객관식 다중',q:'최근 구매한 K-뷰티 카테고리를 모두 골라주세요',opts:['토너패드','부스팅 에센스','클렌저','선크림','마스크팩'],multi:true},
 {n:'Q4',type:'객관식 단일',q:'그 중 가장 만족한 카테고리는?',piped:true},
 {n:'Q5',type:'척도 5점',q:'향후 3개월 내 이 컨셉 제품을 구매할 의향이 있나요?',scale:['전혀 없음','','보통','','매우 있음']},
 {n:'Q6',type:'순위형',q:'구매 결정에 가장 중요한 요인을 순서대로 골라주세요',opts:['성분·효능','가격','리뷰·후기','브랜드 신뢰']},
 {n:'Q7',type:'객관식 단일',q:'주로 어디서 구매하시나요?',opts:['Sephora','Ulta','Amazon','브랜드 자사몰']},
];
const EDGES=[
 {kind:'branch',from:'Q1',to:'END',chip:"‘아니오’ → 설문 종료",icon:'ph-arrow-bend-down-right'},
 {kind:'pipe',from:'Q3',to:'Q4',chip:'보기 파이핑',icon:'ph-arrow-u-down-left'},
 {kind:'branch',from:'Q5',to:'Q6',chip:"‘의향 있음’ → Q6",icon:'ph-arrow-bend-down-right'},
];
const PROMPT='미국 진출용으로 잡은 K뷰티 컨셉, 현지 MZ 여성에게 통할지 검증할 설문 만들어줘';

const $=id=>document.getElementById(id);
let gen=0;

function renderSurvey(){
  const wrap=$('survey');
  // svg 보존, 나머지 제거
  [...wrap.querySelectorAll('.q,.sd-sec,.endnode')].forEach(e=>e.remove());
  SURVEY.forEach(s=>{
    if(s.sec){ const sec=document.createElement('div'); sec.className='sd-sec'; sec.textContent=s.sec; sec.dataset.before=s.n; wrap.appendChild(sec); }
    const q=document.createElement('div'); q.className='q'; q.dataset.q=s.n;
    let body='';
    if(s.scale){ body=`<div class="scale">${s.scale.map(l=>`<span class="sc"><span class="dot"></span>${l}</span>`).join('')}</div>`; }
    else if(s.piped){ body=`<ul class="opts"><li class="opt piped"><span class="mark radio"></span>Q3에서 선택한 보기가 자동으로 들어옵니다</li></ul>`; }
    else { const cls=s.multi?'check':'radio'; body=`<ul class="opts">${s.opts.map(o=>`<li class="opt"><span class="mark ${cls}"></span>${o}</li>`).join('')}</ul>`; }
    q.innerHTML=`<div class="qq"><span class="qn">${s.n}</span>${s.q}</div>
      <div class="qmeta"><span class="qtype">${s.type}</span><span class="lchip" data-lchip="${s.n}"></span></div>${body}`;
    wrap.appendChild(q);
  });
  const end=document.createElement('div'); end.className='endnode'; end.id='endnode';
  end.innerHTML=`<i class="ph ph-flag-checkered"></i>설문 종료`;
  wrap.appendChild(end);
}

function tick(el,to){ // 카운터 틱업
  let n=0; const step=()=>{ n++; el.textContent=n; if(n<to) setTimeout(step,90); }; if(to>0) step();
}

function play(){
  const my=++gen;
  // 리셋
  $('ind').classList.remove('done'); $('say').innerHTML='로직까지 설계해 만들고 있어요…';
  $('c-q').textContent='0'; $('c-b').textContent='0'; $('c-p').textContent='0';
  $('wires').innerHTML='';
  $('prompt').innerHTML='<span class="cursor"></span>';
  renderSurvey();

  // 1) 프롬프트 타이핑
  let i=0;
  (function type(){ if(my!==gen) return;
    if(i<=PROMPT.length){ $('prompt').innerHTML=PROMPT.slice(0,i)+'<span class="cursor"></span>'; i++; setTimeout(type,22); }
    else { $('prompt').textContent=PROMPT; setTimeout(()=>build(my),420); }
  })();
}

function build(my){
  if(my!==gen) return;
  // 2) 문항 cascade
  const qs=[...document.querySelectorAll('.q')];
  qs.forEach((q,idx)=> setTimeout(()=>{ if(my!==gen)return; q.classList.add('in'); $('c-q').textContent=idx+1; },120*idx));
  const afterQ=120*qs.length+300;

  // 3) 로직 와이어 draw (분기·파이핑 살아남)
  let b=0,p=0;
  EDGES.forEach((e,idx)=> setTimeout(()=>{ if(my!==gen)return;
    drawWire(e);
    const chip=document.querySelector(`[data-lchip="${e.from}"]`);
    if(chip){ chip.className=`lchip ${e.kind} show`; chip.innerHTML=`<i class="ph ${e.icon}"></i>${e.chip}`; }
    if(e.to==='END') $('endnode').classList.add('in');
    if(e.kind==='branch'){ b++; $('c-b').textContent=b; } else { p++; $('c-p').textContent=p; }
  }, afterQ+idx*460));

  // 4) 인디케이터 settle + 카피 전환
  const done=afterQ+EDGES.length*460+500;
  setTimeout(()=>{ if(my!==gen)return;
    $('ind').classList.add('done');
    $('say').innerHTML='<b>7문항 · 분기 2 · 파이핑 1</b> 까지 자동 설계 완료. 바로 수집하러 갈 수 있어요.';
  }, done);
}

function drawWire(e){
  const svg=$('wires'); const stage=$('survey');
  const sr=stage.getBoundingClientRect();
  const fromEl=document.querySelector(`[data-q="${e.from}"]`);
  const toEl= e.to==='END' ? $('endnode') : document.querySelector(`[data-q="${e.to}"]`);
  if(!fromEl||!toEl) return;
  const fr=fromEl.getBoundingClientRect(), tr=toEl.getBoundingClientRect();
  const x1=fr.right-sr.left-6, y1=fr.top-sr.top+22;
  const x2=tr.right-sr.left-6, y2=tr.top-sr.top+ (e.to==='END'?16:22);
  const gx=Math.max(x1,x2)+ (e.kind==='pipe'?30:56);  // 거터 깊이 (분기 더 바깥)
  const d=`M ${x1} ${y1} C ${gx} ${y1}, ${gx} ${y2}, ${x2} ${y2}`;
  const ns='http://www.w3.org/2000/svg';
  const path=document.createElementNS(ns,'path');
  path.setAttribute('d',d); path.setAttribute('class',`wire ${e.kind}`);
  path.setAttribute('stroke-width','1.6');
  svg.appendChild(path);
  const len=path.getTotalLength();
  path.style.strokeDasharray=len; path.style.strokeDashoffset=len;
  path.style.transition='stroke-dashoffset 460ms cubic-bezier(.32,.72,0,1)';
  // 화살촉
  const head=document.createElementNS(ns,'path');
  const dir=x2>=gx?-1:1; // 끝점에서 들어오는 방향
  head.setAttribute('d',`M ${x2} ${y2} l ${6*1} ${-4} M ${x2} ${y2} l ${6*1} ${4}`);
  head.setAttribute('class',`wire wire-head ${e.kind}`); head.setAttribute('stroke-width','1.6');
  svg.appendChild(head);
  setTimeout(()=>{
    path.style.strokeDashoffset='0';
    path.style.filter='drop-shadow(0 0 4px '+(e.kind==='pipe'?'rgba(64,176,142,.55)':'rgba(71,129,255,.55)')+')';
    setTimeout(()=>{ path.style.filter='none'; head.style.opacity='1'; },460);
  },30);
}

// 탭 전환
$('tabs').addEventListener('click',ev=>{
  const t=ev.target.closest('.tab'); if(!t) return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  const frameInner=document.querySelector('.frame');
  if(t.dataset.tab==='researcher'){ location.reload(); }
  else {
    const names={analyst:'AI 분석가 — 보고서가 시각화까지 뿅',consumer:'AI 소비자 — 가상 페르소나와 대화 뿅'};
    frameInner.innerHTML=`<div class="placeholder"><i class="ph ph-sparkle"></i>${names[t.dataset.tab]}<br><span style="font-size:12px">다음 단계에서 제작 예정</span></div>`;
  }
});

play();
</script>
</body>
</html>
