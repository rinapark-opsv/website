      <tr><td>Primera 클렌징</td><td>63.1</td><td class="av-hi">69.6</td><td class="av-lo">53.6</td></tr></tbody></table>
      <div class="av-sig-note">🔴 유의하게 높음 · 🔵 낮음 (신뢰수준 80%)</div>
      <div class="av-src"><span class="av-src-pill">Source 1</span><span class="av-src-text">2026 컨셉 테스트</span></div></div>`;
    case 'library': return `<div class="av"><div class="av-label">라이브러리 데이터</div>
      <div class="av-ds active"><span class="av-ds-dot"></span>2026 건강기능식품 트렌드 리포트<span class="av-ds-badge">출처 2</span></div>
      <div class="av-ds active"><span class="av-ds-dot"></span>2025 건강기능식품 트렌드 리포트<span class="av-ds-badge">출처 1</span></div>
      <div class="av-sig-note">자체 데이터 없이 라이브러리로 근거 확보</div></div>`;
    case 'wave': return `<div class="av"><div class="av-label">2025 → 2026 섭취율 증가 (Top)</div>
      <table class="av-ct"><thead><tr><th>유형</th><th>2025</th><th>2026</th><th>증감</th></tr></thead><tbody>
      <tr class="hl"><td>오메가3</td><td>38.1</td><td>40.8</td><td class="av-hi">+2.7</td></tr>
      <tr class="hl"><td>수면 케어</td><td>7.3</td><td>8.3</td><td class="av-hi">+1.0</td></tr>
      <tr><td>항산화/노화방지</td><td>12.3</td><td>13.0</td><td class="av-hi">+0.7</td></tr>
      <tr><td>종합비타민</td><td>50.9</td><td>51.2</td><td>+0.3</td></tr></tbody></table>
      <div class="av-src"><span class="av-src-pill">출처 1·2</span><span class="av-src-text">건기식 트렌드 2025·2026</span></div></div>`;
    case 'trendins': return `<div class="av"><div class="av-label">30대 핵심 인사이트</div>
      <div class="av-ins"><span class="av-ins-num">48.8%</span><span class="av-ins-desc">효능을 최우선 고려 <em>(성분 39.3%·후기)</em></span></div>
      <div class="av-ins"><span class="av-ins-num">79.8%</span><span class="av-ins-desc">알약/캡슐 제형 선호</span></div>
      <div class="av-ins hl"><span class="av-ins-num">46.2%</span><span class="av-ins-desc">네이버 구매 (쿠팡 44.9%)</span></div>
      <div class="av-src"><span class="av-src-pill">출처 1</span><span class="av-src-text">건기식 트렌드 2026</span></div></div>`;
    case 'chart': return `<div class="av"><div class="artifact-chart-wrap">
      <div class="artifact-chart-title">연령대별 브랜드 인지도 (%)</div>
      ${CHART_BARS.map(b=>`<div class="artifact-bar-row"><span class="artifact-bar-label">${b.label}</span>
        <div class="artifact-bar-track"><div class="artifact-bar-fill" style="width:0%;background:linear-gradient(90deg,#4781FF,#22C0E0)" data-w="${b.value}"></div></div>
        <span class="artifact-bar-val">${b.value}%</span></div>`).join('')}</div></div>`;
    default: return '';
  }
}
function updateArtifact(scene){
  if(!scene.preview){ closeArtifact(); return; }
  if(scene.preview==='prompt'){ if(!lastArtifact) closeArtifact(); $('artifact-title').textContent='분석 중…'; return; }
  lastArtifact=scene.preview;
  $('artifact-title').textContent=scene.hl;
  $('artifact-body').innerHTML=previewHTML(scene.preview);
  openArtifact();
  if(scene.preview==='chart'){
    setTimeout(()=>document.querySelectorAll('#artifact-body .artifact-bar-fill').forEach(b=>{b.style.width=b.dataset.w+'%';}),60);
  }
}
const PANEL_TITLES={concepts:'컨셉 구매의향 TOP2',agecross:'연령대별 구매의향',wave:'카테고리 트렌드',project:'프로젝트',survey:'설문 문항 미리보기',conceptds:'데이터셋',library:'라이브러리 데이터',chart:'연령대별 차트',brief:'리서치 기획서',briefdocC:'프로젝트 브리프',designsurvey:'설문 미리보기',designbriefdoc:'프로젝트 브리프',collectdoc:'수집 조건',designplandoc:'정량조사 설계서',plandocC:'정량조사 설계서',projectdata:'프로젝트 데이터',briefv2:'리서치 설계서',insights:'Summary',insights2:'Summary',filter:'세그먼트 인사이트',overview:'프로젝트 오버뷰',dataset:'데이터셋',crosstab:'크로스탭',trendins:'세그먼트 인사이트'};
/* 자동 시연: 버튼 눌림 효과 → 아티팩트 오픈 (일시정지 없음) */
function showPanel(type){
  $('artifact-title').textContent=PANEL_TITLES[type]||'미리보기';
  $('artifact-body').innerHTML=previewHTML(type);
  document.querySelector('.app').classList.add('artifact-open');
}
function pressLast(sel){
  const els=document.querySelectorAll(sel); const el=els[els.length-1];
  if(el){ el.classList.add('pressing'); setTimeout(()=>el.classList.remove('pressing'), 500); }
  return !!el;
}
/* 프로젝트 데이터 행 클릭 → 프로젝트 선택으로 간주, 다음 대화 턴 진행 */
function projectRowClick(){
  const designIdx=SCENARIOS.findIndex(s=>s.id==='design');
  if(sIdx===designIdx && scIdx===1){
    clearTimeout(resumeT); clearTimeout(timer);
    if(!playing){ playing=true; statuses[sIdx]='active'; renderSidebar(); }
    advance();
  } else {
    openPanel('designsurvey');
  }
}
/* 채팅 아티팩트 클릭 → 제품처럼 사이드 패널 오픈 (보는 동안 일시정지, 6초 뒤 자동 재개) */
let resumeT=null;
function openPanel(type){
  pauseForUser();
  clearTimeout(resumeT);
  resumeT=setTimeout(()=>{ if(!userTyping && !playing){ playing=true; statuses[sIdx]='active'; renderSidebar(); advance(); } }, 6000);
  $('artifact-title').textContent=PANEL_TITLES[type]||'미리보기';
  $('artifact-body').innerHTML=previewHTML(type);
  document.querySelector('.app').classList.add('artifact-open');
  if(type==='chart') setTimeout(()=>document.querySelectorAll('#artifact-body .artifact-bar-fill').forEach(bb=>{bb.style.width=bb.dataset.w+'%';}),60);
}
function openArtifact(){ document.querySelector('.app').classList.add('artifact-open'); }
function closeArtifact(){ document.querySelector('.app').classList.remove('artifact-open'); }
function toggleArtifact(){ document.querySelector('.app').classList.toggle('artifact-open'); }

/* ── playback ── */
/* 자동 클릭: 다음 씬의 유저 메시지와 일치하는 꼬리질문 칩을 선택(시나리오 기반) */
function autoTapFollowup(myGen){
  const blocks=document.querySelectorAll('#live-chat .cc-follow');
  const lf=blocks[blocks.length-1];
  if(!lf) return;
  const chips=[...lf.querySelectorAll('.cc-follow-chip')];
  if(!chips.length) return;
  const sc=SCENARIOS[sIdx], ns=sc&&sc.scenes[scIdx+1];
  const nextText=(ns&&ns.chat&&ns.chat[0]&&ns.chat[0].role==='user'&&ns.chat[0].text)?ns.chat[0].text.trim():null;
  let chip=null;
  if(nextText) chip=chips.find(c=>{ const s=c.querySelector('span'); return s && s.textContent.trim()===nextText; });
  chip=chip||chips[0];
  chip.classList.add('is-tapped');
  setTimeout(()=>{ if(playing&&myGen===gen){ chip.classList.remove('is-tapped'); chip.classList.remove('active'); } }, 600);
}
function skimArtifact(myGen, done){
  const el=$('artifact-body');
  if(!el){ done&&done(); return; }
  el.scrollTop=0;
  const max=Math.max(0, el.scrollHeight - el.clientHeight);
  if(max<12){ setTimeout(()=>{ if(playing&&myGen===gen) done&&done(); }, 500); return; }
  const dur=1900, steps=38, dt=dur/steps; let k=0;
  const iv=setInterval(()=>{
    if(!playing||myGen!==gen){ clearInterval(iv); return; }
    k++; const p=k/steps; const e = p<.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2;   /* easeInOutQuad */
    el.scrollTop = max*e;
    if(k>=steps){ clearInterval(iv); setTimeout(()=>{ if(playing&&myGen===gen) done&&done(); }, 300); }
  }, dt);
}
function showScene(skipFirstTyping=false){
  const sc=SCENARIOS[sIdx], scene=sc.scenes[scIdx];
  renderSidebar();
  if(sc.panel===false){ closeArtifact(); }   // 제품: 분석은 인라인, 패널 없음
  else if(scene.press){ closeArtifact(); }    // 더보기/클릭으로 여는 흐름 → 완료 카드까진 패널 닫힘, press 때 오픈
  else updateArtifact(scene);
  playSceneMessages(scene, ()=>{ if(!playing) return; clearTimeout(timer);
    if(scene.open){
      const myGen=gen;
      setTimeout(()=>{ if(!playing||myGen!==gen) return;
        const pressed=scene.press?pressLast(scene.press):false;
        setTimeout(()=>{ if(!playing||myGen!==gen) return;
          showPanel(scene.open);
          const hasDefer=!!document.querySelector('#live-chat .rv-defer');
          if(hasDefer){
            /* 패널 등장 → 위→아래로 한 번 훑어내림 → 그 다음 꼬리질문 */
            setTimeout(()=>{ if(!playing||myGen!==gen) return;
              skimArtifact(myGen, ()=>{ if(!playing||myGen!==gen) return;
                revealDeferred();
                if(scene.chipAfter) setTimeout(()=>{ if(playing&&myGen===gen) autoTapFollowup(myGen); }, 1500);
                timer=setTimeout(advance, 2900);
              });
            }, 500);
          } else {
            setTimeout(()=>{ if(playing&&myGen===gen) revealDeferred(); }, 650);
            if(scene.chipAfter){ setTimeout(()=>{ if(playing&&myGen===gen) pressLast(scene.chipAfter); }, DWELL_MS+2200); }
            timer=setTimeout(advance, DWELL_MS+3000);
          }
        }, pressed?450:0);
      }, 800);
    } else {
      const d=scene.dwell||DWELL_MS;
      if(scene.chipAfter){
        const myGen=gen;
        setTimeout(()=>{ if(playing&&myGen===gen) autoTapFollowup(myGen); }, d);
        timer=setTimeout(advance, d+1300);
      } else {
        timer=setTimeout(advance, d);
      }
    }
  }, skipFirstTyping);
}
function advance(){
  if(!playing) return;
  const sc=SCENARIOS[sIdx];
  if(scIdx+1<sc.scenes.length){ scIdx++; showScene(); }
  else {
    statuses[sIdx]='done'; renderSidebar();
    let nx=SCENARIOS.findIndex((_,i)=>statuses[i]!=='done');
    if(nx===-1){ playing=false; showEndCTA(); return; }
    setTimeout(()=>{ if(playing||statuses.some(s=>s!=='done')) playScenario(nx, true); }, 800);
  }
}
function playScenario(i, skipFirstTyping=false){
  gen++; clearTimeout(timer); clearInterval(typingTimer); userTyping=false; hideCTA();
  sIdx=i; scIdx=0; lastArtifact=null;
  if(statuses[i]!=='done') statuses[i]='active';
  playing=true;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('chat-live').classList.add('active');
  $('live-chat').innerHTML='';
  clearInput();
  closeArtifact();
  showScene(skipFirstTyping);
}

/* ── Ask 인트로 → 첫번째 시나리오 자동 진입 ── */
function askIntro(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('chat-home').classList.add('active');
  closeArtifact();
  const hi=$('home-input-el');
  setTimeout(()=>{
    if(userTyping) return;
    typeInto(hi, '미국 MZ 여성 대상 K뷰티 구매 의향 조사 브리프 써줘', ()=>{
      setTimeout(()=>{ if(!userTyping) playScenario(0); }, 850);
    });
  }, 700);
}

/* ── 직접 입력 (Cursor 방식) ── */
function pauseForUser(){ gen++; playing=false; clearTimeout(timer); clearInterval(typingTimer); }
function showCTA(){ $('cta-hint').classList.add('show'); }
function hideCTA(){ $('cta-hint').classList.remove('show'); }
function userSend(text){
  pauseForUser(); hideEndCTA();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('chat-live').classList.add('active');
  const inner=$('live-chat');
  inner.insertAdjacentHTML('beforeend', msgHTML({role:'user',text})); clearInput(); scrollChat();
  setTimeout(()=>{
    inner.insertAdjacentHTML('beforeend',
      `<div class="msg-ai msg-enter"><div class="ai-header"><div class="ai-avatar">${STAR}</div></div>
       <div class="ai-prose">내 데이터로 직접 분석해 보려면, <a class="demo-link" href="https://opensurvey.io" target="_blank" rel="noreferrer">Dataspace 시작하기 →</a></div></div>`);
    scrollChat();
  }, 650);
}
function showEndCTA(){
  const inner=$('live-chat');
  if(inner.querySelector('.end-cta-card')) return;
  inner.insertAdjacentHTML('beforeend',
    `<div class="end-cta-card msg-enter">
       <div class="end-cta-title">리서치 설계 · 분석 · 공유, 전 과정을 한 번에</div>
       <div class="end-cta-sub">질문 한 줄로 시작해 보세요. Ask. AI does the rest.</div>
       <a class="cta-btn lg" href="https://opensurvey.io" target="_blank" rel="noreferrer">Dataspace 시작하기 →</a>
     </div>`);
  scrollChat(); showCTA();
}
function hideEndCTA(){ const c=$('live-chat'); const e=c&&c.querySelector('.end-cta-card'); if(e) e.remove(); }

function goHome(){ pauseForUser(); askIntro(); document.querySelectorAll('.chat-item').forEach(i=>i.classList.remove('active')); }

/* ── wire manual input ── */
/* 전송 버튼: 입력 전 비활성(연파랑) ↔ 입력 시 활성(블루) — 제품 컴포저 */
function updateSendState(){
  const hi=$('home-input-el'), hs=$('home-send');
  if(hi&&hs) hs.classList.toggle('idle', !hi.value.trim());
  const li=$('live-input'), ls=$('live-send');
  if(li&&ls) ls.classList.toggle('idle', !li.value.trim());
}
function wireInputs(){
  updateSendState();
  const li=$('live-input');
  if(li){
    li.addEventListener('focus', ()=>{ userTyping=true; pauseForUser(); showCTA(); });
    li.addEventListener('input', ()=>{ userTyping=true; });
    li.addEventListener('keydown', (e)=>{
      if(e.isComposing || e.keyCode===229) return;   /* 한글 IME 조합 중 Enter 중복 방지 */
      if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); const v=li.value.trim(); if(v) userSend(v); }
      else if(e.key==='Escape'){ li.blur(); userTyping=false; }
    });
  }
  const ls=$('live-send'); if(ls) ls.addEventListener('click', ()=>{ const v=$('live-input').value.trim(); if(v) userSend(v); });
  const hi=$('home-input-el');
  if(hi){ hi.addEventListener('focus', ()=>{ userTyping=true; clearInterval(typingTimer); hi.value=''; updateSendState(); });
          hi.addEventListener('input', updateSendState);
          hi.addEventListener('keydown',(e)=>{ if(e.isComposing||e.keyCode===229) return; if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); userTyping=false; playScenario(ANALYSIS_IDX); } }); }
}

renderSidebar();
wireInputs();
askIntro();
{ const m=location.hash.match(/^#play(\d+)$/); if(m) setTimeout(()=>playScenario(+m[1]), 900); } // QA: 특정 시나리오 바로 재생
</script>
